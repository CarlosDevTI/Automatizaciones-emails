<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 16px 0;">
  <tr>
    <td style="background-color:{% if tone == 'accent' %}#17324d{% else %}#f7fafc{% endif %};border:1px solid {% if tone == 'accent' %}#17324d{% else %}#dce5ee{% endif %};border-radius:14px;padding:16px 18px;">
      <div style="font-size:12px;line-height:1.4;color:{% if tone == 'accent' %}#d7e8f7{% else %}#63778b{% endif %};margin-bottom:6px;">{{ label }}</div>
      <div style="font-size:{% if tone == 'primary' %}30px{% else %}24px{% endif %};line-height:1.15;font-weight:700;color:{% if tone == 'accent' %}#ffffff{% else %}#17324d{% endif %};">{{ value }}</div>
      {% if note %}<div style="font-size:12px;line-height:1.5;color:{% if tone == 'accent' %}#d7e8f7{% else %}#63778b{% endif %};margin-top:8px;">{{ note }}</div>{% endif %}
    </td>
  </tr>
</table>
